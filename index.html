<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Background mewah perpaduan hitam dan corak biru malam gelap */
            background: radial-gradient(circle at top, #0c1622 0%, #060a0f 100%); 
            color: #ffffff;
            padding: 40px 20px;
            display: flex;
            flex-direction: column; 
            align-items: center;    
            min-height: 100vh;
        }

        /* Container Header Mewah */
        .main-header {
            width: 100%;
            max-width: 1400px;
            text-align: center;
            padding: 20px 10px 40px 10px;
            position: relative;
        }

        /* Garis estetika di kiri-kanan teks subtitle */
        .header-title-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .header-line {
            flex: 1;
            max-width: 150px;
            height: 1px;
            background: linear-gradient(to var(--dir, right), rgba(212, 175, 55, 0.4), rgba(212, 175, 55, 0));
        }

        .main-header h2 {
            font-family: 'Georgia', serif;
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 4px;
            color: #d4af37; /* Warna Emas */
            text-transform: uppercase;
            opacity: 0.8;
        }

        .main-header h1 {
            font-family: 'Georgia', serif;
            font-size: 2.8rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: #ffffff;
            margin-top: 5px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Container Utama Grid */
        .gallery-container {
            width: 100%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            padding: 10px;
        }

        /* Link Wrapper untuk Card */
        .video-card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        /* Styling Card Video Mewah */
        .video-card {
            position: relative;
            background-color: #0b1116;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 3 / 4; 
            /* Bingkai emas tipis elegan */
            border: 1px solid rgba(212, 175, 55, 0.25); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
        }

        /* Efek saat Card di-hover (Menyala Emas) */
        .video-card:hover {
            transform: translateY(-8px);
            border-color: rgba(212, 175, 55, 0.7);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.15), 0 5px 15px rgba(0,0,0,0.6);
        }

        /* Gambar Thumbnail */
        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .video-card:hover .thumbnail {
            transform: scale(1.03);
        }

        /* Overlay Gelap di Atas Gambar */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.85) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Styling Ikon Play Emas - Selalu Muncul */
        .play-icon-wrap {
            width: 55px;
            height: 55px;
            background: rgba(15, 23, 30, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 35px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        .play-icon {
            font-size: 1.4rem;
            color: #e5c158; /* Warna Emas Premium */
            margin-left: 3px; /* Penyelaras presisi di tengah lingkaran */
            text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.3);
        }

        /* Efek saat card di-hover, tombol play sedikit membesar */
        .video-card:hover .play-icon-wrap {
            background: rgba(212, 175, 55, 0.2);
            border-color: #d4af37;
            transform: scale(1.1);
        }

        /* Info Judul Video */
        .video-title {
            font-family: 'Georgia', serif;
            position: absolute;
            bottom: 38px; 
            left: 15px;
            right: 15px;
            font-size: 0.95rem;
            font-weight: 400;
            color: #f8f9fa;
            letter-spacing: 0.3px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.9);
        }

        /* Badge Durasi Video Premium */
        .duration-badge {
            position: absolute;
            bottom: 12px;
            right: 15px;
            background-color: rgba(15, 23, 30, 0.85); 
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #e5c158; /* Teks durasi warna emas */
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>
